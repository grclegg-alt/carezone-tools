<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deprivation & OHCA Risk | CARe Zone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0ede8;font-family:'DM Sans',sans-serif;font-size:13px;color:#1a1a2e}
.app{display:flex;flex-direction:column;height:100vh;padding:8px;gap:6px}

.toolbar{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;padding:6px 12px;flex-shrink:0}
.tb-title{font-size:13px;font-weight:500;color:#1a1a2e;white-space:nowrap}
.sep{width:1px;height:18px;background:rgba(26,26,46,.12);flex-shrink:0}
.tb-label{font-size:11px;color:#7a7a9a;white-space:nowrap}
.pills{display:flex;gap:3px}
.pill{font-size:11px;padding:3px 10px;border-radius:999px;border:1px solid rgba(26,26,46,.15);background:transparent;color:#3d3d5c;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .12s}
.pill.ac-cpr{background:#0d3b6e;color:white;border-color:#0d3b6e}
.pill.ac-pad{background:#1e5631;color:white;border-color:#1e5631}
.pill.ac-rt{background:#4a235a;color:white;border-color:#4a235a}
select{font-size:11px;padding:3px 7px;border:1px solid rgba(26,26,46,.15);border-radius:4px;background:white;color:#1a1a2e;font-family:'DM Sans',sans-serif;cursor:pointer}

.stats{display:flex;gap:5px;flex-shrink:0}
.st{background:white;border:1px solid rgba(26,26,46,.1);border-radius:5px;padding:4px 10px;display:flex;align-items:baseline;gap:6px;white-space:nowrap}
.st-n{font-size:15px;font-weight:600;line-height:1}
.st-d{font-size:10px;color:#7a7a9a}

.chart-card{background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;flex:1;position:relative;min-height:0;overflow:hidden}
canvas{position:absolute;top:0;left:0}

.tt{position:absolute;background:#1a1a2e;color:#f7f5f0;border-radius:6px;padding:10px 13px;font-size:11px;pointer-events:none;display:none;z-index:20;min-width:175px}
.tt-name{font-size:13px;font-weight:500;margin-bottom:6px}
.tt-row{display:flex;justify-content:space-between;gap:12px;color:rgba(247,245,240,.6);margin-bottom:3px}
.tt-val{font-weight:500;color:rgba(247,245,240,.9)}
.tt-warn{margin-top:6px;padding-top:5px;border-top:1px solid rgba(247,245,240,.15);font-size:10px;color:#f4a09a;font-weight:500}

.legend{display:flex;align-items:center;gap:8px;flex-wrap:wrap;background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;padding:5px 12px;flex-shrink:0}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:#3d3d5c}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.note{font-size:10px;color:#b7650a;margin-left:auto}
</style>
</head>
<body>
<div class="app">
  <div class="toolbar">
    <span class="tb-title">Deprivation &amp; OHCA Risk — 32 Scottish Councils</span>
    <div class="sep"></div>
    <span class="tb-label">Colour by</span>
    <div class="pills">
      <button class="pill ac-cpr" id="p-cpr" onclick="setColor('cpr')">Bystander CPR</button>
      <button class="pill" id="p-pad" onclick="setColor('pad')">PAD use</button>
      <button class="pill" id="p-rt" onclick="setColor('rt')">Response time</button>
    </div>
    <div class="sep"></div>
    <span class="tb-label">Highlight</span>
    <select onchange="setHL(this.value)">
      <option value="">All councils</option>
      <option>Inverclyde</option><option>West Dunbartonshire</option><option>Glasgow City</option>
      <option>Dundee City</option><option>Dumfries And Galloway</option><option>North Ayrshire</option>
      <option>East Ayrshire</option><option>North Lanarkshire</option><option>City Of Edinburgh</option>
      <option>Highland</option><option>Aberdeen City</option><option>Clackmannanshire</option>
    </select>
  </div>

  <div class="stats">
    <div class="st"><span class="st-n" style="color:#0d3b6e">32</span><span class="st-d">councils</span></div>
    <div class="st"><span class="st-n">278–631</span><span class="st-d">OHCA per 100k</span></div>
    <div class="st"><span class="st-n">2–39%</span><span class="st-d">Deprivation range</span></div>
    <div class="st"><span class="st-n" style="color:#c0392b">7</span><span class="st-d">high-risk &amp; deprived</span></div>
  </div>

  <div class="chart-card" id="chartCard">
    <canvas id="bgC"></canvas>
    <canvas id="bubC"></canvas>
    <div class="tt" id="tt"></div>
  </div>

  <div class="legend" id="leg">
    <span class="note">Source: SAS data · SIMD 2020 · Bubble size = population</span>
  </div>
</div>

<script>
const DATA=[
  {la:"Inverclyde",simd:37.8,ohca:631.1,pop:77800,cpr:66.4,pad:6.9,rt:9.0},
  {la:"Na H-Eileanan An Iar",simd:16.4,ohca:625.0,pop:26720,cpr:59.9,pad:20.4,rt:14.0},
  {la:"Renfrewshire",simd:21.4,ohca:527.6,pop:179100,cpr:57.5,pad:6.3,rt:8.0},
  {la:"Clackmannanshire",simd:25.6,ohca:518.0,pop:51540,cpr:67.8,pad:8.2,rt:12.25},
  {la:"East Ayrshire",simd:28.9,ohca:480.3,pop:122010,cpr:66.4,pad:9.7,rt:8.0},
  {la:"Argyll And Bute",simd:11.3,ohca:479.8,pop:85870,cpr:59.7,pad:9.5,rt:12.5},
  {la:"South Lanarkshire",simd:20.8,ohca:471.4,pop:319020,cpr:64.3,pad:6.2,rt:9.0},
  {la:"Dumfries And Galloway",simd:13.8,ohca:466.9,pop:148860,cpr:64.6,pad:12.5,rt:10.5},
  {la:"West Dunbartonshire",simd:38.5,ohca:463.3,pop:88930,cpr:65.4,pad:14.3,rt:9.0},
  {la:"Dundee City",simd:32.4,ohca:451.4,pop:149320,cpr:59.2,pad:7.3,rt:7.0},
  {la:"Fife",simd:19.1,ohca:442.5,pop:373550,cpr:62.5,pad:10.2,rt:10.0},
  {la:"South Ayrshire",simd:22.7,ohca:436.9,pop:112610,cpr:58.7,pad:7.1,rt:9.0},
  {la:"North Lanarkshire",simd:27.6,ohca:433.9,pop:340180,cpr:64.0,pad:6.0,rt:9.0},
  {la:"Angus",simd:14.1,ohca:430.0,pop:115820,cpr:63.1,pad:9.6,rt:12.75},
  {la:"Perth And Kinross",simd:8.3,ohca:425.8,pop:151950,cpr:56.1,pad:16.5,rt:12.0},
  {la:"Shetland Islands",simd:2.1,ohca:405.0,pop:23210,cpr:55.3,pad:13.8,rt:16.75},
  {la:"North Ayrshire",simd:31.5,ohca:397.1,pop:134740,cpr:60.9,pad:7.1,rt:9.25},
  {la:"East Lothian",simd:10.4,ohca:391.3,pop:107090,cpr:65.1,pad:18.1,rt:9.0},
  {la:"Scottish Borders",simd:8.9,ohca:390.4,pop:115510,cpr:64.1,pad:16.2,rt:12.0},
  {la:"Moray",simd:8.7,ohca:386.1,pop:95820,cpr:60.5,pad:9.7,rt:11.0},
  {la:"Midlothian",simd:12.5,ohca:382.9,pop:92460,cpr:61.3,pad:11.6,rt:9.0},
  {la:"West Lothian",simd:16.3,ohca:377.7,pop:182140,cpr:66.7,pad:6.2,rt:9.0},
  {la:"Glasgow City",simd:34.2,ohca:377.5,pop:633120,cpr:65.4,pad:8.2,rt:8.0},
  {la:"Aberdeen City",simd:18.2,ohca:373.1,pop:227560,cpr:74.4,pad:13.3,rt:7.0},
  {la:"Highland",simd:9.6,ohca:362.6,pop:235540,cpr:62.6,pad:14.8,rt:10.0},
  {la:"Aberdeenshire",simd:5.1,ohca:352.6,pop:261210,cpr:61.2,pad:17.9,rt:14.5},
  {la:"Falkirk",simd:20.3,ohca:347.4,pop:160340,cpr:64.5,pad:6.6,rt:8.0},
  {la:"Orkney Islands",simd:3.2,ohca:341.3,pop:22270,cpr:47.4,pad:9.2,rt:10.5},
  {la:"Stirling",simd:12.1,ohca:302.5,pop:94210,cpr:63.2,pad:12.6,rt:9.0},
  {la:"City Of Edinburgh",simd:14.7,ohca:298.7,pop:524930,cpr:64.5,pad:13.1,rt:8.0},
  {la:"East Dunbartonshire",simd:3.8,ohca:278.9,pop:108640,cpr:73.6,pad:10.2,rt:10.0},
  {la:"East Renfrewshire",simd:4.2,ohca:278.4,pop:95530,cpr:65.0,pad:8.6,rt:9.5}
];

const SC={
  cpr:{min:47,max:76,r:[[214,234,248],[13,59,110]],lbl:'Bystander CPR rate',u:'%'},
  pad:{min:6,max:21,r:[[212,237,218],[30,107,63]],lbl:'PAD use rate',u:'%'},
  rt:{min:7,max:17,r:[[232,218,240],[74,28,104]],lbl:'Response time',u:' min',inv:true}
};
let cm='cpr',hl='';
const notable=['Glasgow City','Inverclyde','Dundee City','West Dunbartonshire','City Of Edinburgh','Dumfries And Galloway','Highland','Aberdeen City','North Lanarkshire','Clackmannanshire','North Ayrshire','East Ayrshire','Renfrewshire'];

function lp(a,b,t){return Math.round(a+(b-a)*t);}
function col(d){
  const s=SC[cm]; const v=cm==='cpr'?d.cpr:cm==='pad'?d.pad:d.rt;
  let t=(v-s.min)/(s.max-s.min); if(s.inv)t=1-t; t=Math.max(0,Math.min(1,t));
  return `rgb(${lp(s.r[0][0],s.r[1][0],t)},${lp(s.r[0][1],s.r[1][1],t)},${lp(s.r[0][2],s.r[1][2],t)})`;
}
function isHR(d){return d.simd>20&&d.ohca>420;}
function bR(p,W){return Math.max(6,Math.min(W/20,Math.sqrt(p/633120)*54));}

function draw(){
  const card=document.getElementById('chartCard');
  const W=card.clientWidth,H=card.clientHeight;
  ['bgC','bubC'].forEach(id=>{const c=document.getElementById(id);c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';});
  const P={l:50,r:16,t:14,b:40};
  const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const xp=v=>P.l+(v/42)*cW;
  const yp=v=>P.t+cH-((v-250)/410)*cH;

  // Background
  const bg=document.getElementById('bgC').getContext('2d');
  bg.clearRect(0,0,W,H);
  const gc='rgba(26,26,46,0.06)',tc='rgba(26,26,46,0.36)',ac='rgba(26,26,46,0.16)';
  bg.font='10px "DM Sans",sans-serif';
  [0,10,20,30,40].forEach(v=>{
    const x=xp(v); bg.strokeStyle=gc;bg.lineWidth=0.5;bg.beginPath();bg.moveTo(x,P.t);bg.lineTo(x,P.t+cH);bg.stroke();
    bg.fillStyle=tc;bg.textAlign='center';bg.fillText(v+'%',x,P.t+cH+15);
  });
  [300,350,400,450,500,550,600,650].forEach(v=>{
    const y=yp(v);if(y<P.t||y>P.t+cH)return;
    bg.strokeStyle=gc;bg.lineWidth=0.5;bg.beginPath();bg.moveTo(P.l,y);bg.lineTo(P.l+cW,y);bg.stroke();
    bg.fillStyle=tc;bg.textAlign='right';bg.fillText(v,P.l-5,y+4);
  });
  bg.strokeStyle=ac;bg.lineWidth=1;
  bg.beginPath();bg.moveTo(P.l,P.t);bg.lineTo(P.l,P.t+cH);bg.stroke();
  bg.beginPath();bg.moveTo(P.l,P.t+cH);bg.lineTo(P.l+cW,P.t+cH);bg.stroke();
  // Quadrant shading
  const qx=xp(20),qy=yp(420);
  bg.fillStyle='rgba(192,57,43,0.04)';bg.strokeStyle='rgba(192,57,43,0.15)';bg.lineWidth=0.75;
  bg.setLineDash([4,3]);bg.beginPath();bg.rect(qx,P.t,P.l+cW-qx,qy-P.t);bg.fill();bg.stroke();bg.setLineDash([]);
  bg.font='9px "DM Sans",sans-serif';bg.fillStyle='rgba(192,57,43,0.5)';bg.textAlign='right';
  bg.fillText('High deprivation + high OHCA',P.l+cW-5,P.t+11);
  // Axis labels
  bg.fillStyle='rgba(26,26,46,0.38)';bg.font='10px "DM Sans",sans-serif';bg.textAlign='center';
  bg.fillText('Deprivation — % population in most deprived 20% (SIMD 2020)',P.l+cW/2,H-5);
  bg.save();bg.translate(12,P.t+cH/2);bg.rotate(-Math.PI/2);bg.fillText('OHCA per 100,000 population',0,0);bg.restore();

  // Bubbles
  const bub=document.getElementById('bubC').getContext('2d');
  bub.clearRect(0,0,W,H);
  [...DATA].sort((a,b)=>b.pop-a.pop).forEach(d=>{
    const x=xp(d.simd),y=yp(d.ohca),r=bR(d.pop,W);
    const c=col(d);const isHL=hl&&d.la===hl;const faded=hl&&!isHL;
    bub.globalAlpha=faded?0.1:0.88;
    bub.beginPath();bub.arc(x,y,r,0,Math.PI*2);bub.fillStyle=c;bub.fill();
    bub.globalAlpha=faded?0.07:1;
    if(isHL){bub.strokeStyle='#c0392b';bub.lineWidth=2.5;}
    else if(!hl&&isHR(d)){bub.strokeStyle='rgba(192,57,43,0.55)';bub.lineWidth=1.5;}
    else{bub.strokeStyle='rgba(26,26,46,0.12)';bub.lineWidth=0.75;}
    bub.stroke();bub.globalAlpha=1;
    if(!faded&&(notable.includes(d.la)||isHL)){
      const sn=d.la.replace('City Of ','').replace(' And ',' & ').replace(' Dunbartonshire',' Dunb.').replace(' Lanarkshire',' Lnk.');
      bub.font=`${r>14?9:8}px "DM Sans",sans-serif`;bub.textAlign='center';bub.textBaseline='middle';
      if(r>=13){
        bub.fillStyle='rgba(26,26,46,0.75)';
        const w=sn.split(' ');
        if(w.length>2){bub.fillText(w.slice(0,2).join(' '),x,y-4);bub.fillText(w.slice(2).join(' '),x,y+5);}
        else bub.fillText(sn,x,y);
      }else{bub.fillStyle='rgba(26,26,46,0.6)';bub.textBaseline='bottom';bub.fillText(sn,x,y-r-2);}
    }
  });
  bub.globalAlpha=1;
  buildLegend();
}

function buildLegend(){
  const s=SC[cm];
  const sw=Array.from({length:5},(_,i)=>{
    const t=i/4;const ti=s.inv?1-t:t;const v=s.min+(s.max-s.min)*t;
    const c=`rgb(${lp(s.r[0][0],s.r[1][0],ti)},${lp(s.r[0][1],s.r[1][1],ti)},${lp(s.r[0][2],s.r[1][2],ti)})`;
    return `<span class="leg"><span class="leg-dot" style="background:${c};border:0.5px solid rgba(26,26,46,.15)"></span>${Math.round(v)}${s.u}</span>`;
  });
  document.getElementById('leg').innerHTML=`<span style="font-size:10px;font-weight:500;color:#7a7a9a;margin-right:3px">${s.lbl}:</span>${sw.join('')}<span class="note">Source: SAS / SIMD 2020 · bubble = population</span>`;
}

function setColor(m){
  cm=m;['cpr','pad','rt'].forEach(id=>{document.getElementById('p-'+id).className='pill'+(id===m?' ac-'+m:'');});draw();
}
function setHL(v){hl=v;draw();}

document.getElementById('bubC').addEventListener('mousemove',function(e){
  const rect=this.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const W=this.width,H=this.height;
  const P={l:50,r:16,t:14,b:40};const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const xp=v=>P.l+(v/42)*cW;const yp=v=>P.t+cH-((v-250)/410)*cH;
  const tt=document.getElementById('tt');let hit=null;
  for(const d of DATA){const x=xp(d.simd),y=yp(d.ohca),r=bR(d.pop,W);if(Math.hypot(mx-x,my-y)<=r+4){hit=d;break;}}
  if(hit){
    tt.innerHTML=`<div class="tt-name">${hit.la}</div>
      <div class="tt-row"><span>OHCA per 100k</span><span class="tt-val">${hit.ohca.toFixed(0)}</span></div>
      <div class="tt-row"><span>Deprivation</span><span class="tt-val">${hit.simd}%</span></div>
      <div class="tt-row"><span>Population</span><span class="tt-val">${hit.pop.toLocaleString()}</span></div>
      <div class="tt-row"><span>Bystander CPR</span><span class="tt-val">${hit.cpr.toFixed(1)}%</span></div>
      <div class="tt-row"><span>PAD use</span><span class="tt-val">${hit.pad.toFixed(1)}%</span></div>
      <div class="tt-row"><span>Response time</span><span class="tt-val">${hit.rt} min</span></div>
      ${isHR(hit)?'<div class="tt-warn">⚠ High risk + high deprivation</div>':''}`;
    tt.style.left=(mx>W*0.6?mx-185:mx+14)+'px';
    tt.style.top=Math.max(0,my-10)+'px';tt.style.display='block';this.style.cursor='crosshair';
  }else{tt.style.display='none';this.style.cursor='default';}
});
document.getElementById('bubC').addEventListener('mouseleave',()=>document.getElementById('tt').style.display='none');
window.addEventListener('load',draw);
window.addEventListener('resize',draw);
</script>
</body>
</html>
