<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PAD vs Responder | CARe Zone</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:#f0ede8;font-family:'DM Sans',sans-serif;font-size:13px;color:#1a1a2e}
.app{display:flex;flex-direction:column;height:100vh;padding:8px;gap:6px}

/* TOOLBAR */
.toolbar{display:flex;align-items:center;gap:6px;flex-wrap:wrap;background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;padding:6px 10px;flex-shrink:0}
.tb-title{font-size:12px;font-weight:500;color:#1a1a2e;white-space:nowrap}
.sep{width:1px;height:16px;background:rgba(26,26,46,.12);flex-shrink:0;margin:0 2px}
.tb-label{font-size:11px;color:#7a7a9a;white-space:nowrap}
.pills{display:flex;gap:3px}
.pill{font-size:11px;padding:2px 9px;border-radius:999px;border:1px solid rgba(26,26,46,.15);background:transparent;color:#3d3d5c;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;transition:all .12s}
.pill.on{background:#1a1a2e;color:white;border-color:#1a1a2e}
.pill.on-pad{background:#0d4f6e;color:white;border-color:#0d4f6e}
.pill.on-resp{background:#6b2f0a;color:white;border-color:#6b2f0a}
.pill.on-both{background:#2e5c1a;color:white;border-color:#2e5c1a}
select{font-size:11px;padding:2px 6px;border:1px solid rgba(26,26,46,.15);border-radius:4px;background:white;color:#1a1a2e;font-family:'DM Sans',sans-serif;cursor:pointer}
.data-note{font-size:10px;color:#b7650a;margin-left:auto;white-space:nowrap}

/* COUNTS */
.counts{display:flex;gap:5px;flex-shrink:0}
.ct{background:white;border:1px solid rgba(26,26,46,.1);border-radius:5px;padding:3px 10px;display:flex;align-items:baseline;gap:5px;white-space:nowrap}
.ct-n{font-size:15px;font-weight:600;line-height:1}
.ct-d{font-size:10px;color:#7a7a9a}

/* VIEW TABS */
.vtabs{display:flex;gap:0;background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;overflow:hidden;flex-shrink:0}
.vtab{flex:1;font-size:11px;font-weight:400;padding:5px 8px;border:none;background:none;cursor:pointer;color:#7a7a9a;border-right:1px solid rgba(26,26,46,.08);font-family:'DM Sans',sans-serif;transition:all .12s}
.vtab:last-child{border-right:none}
.vtab.active{background:#1a1a2e;color:white;font-weight:500}

/* CHART */
.chart-card{background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;flex:1;position:relative;min-height:0;overflow:hidden}
canvas{position:absolute;top:0;left:0}

/* TOOLTIP */
.tt{position:fixed;background:#1a1a2e;color:#f7f5f0;border-radius:6px;padding:10px 13px;font-size:11px;pointer-events:none;display:none;z-index:100;min-width:185px}
.tt-name{font-size:12px;font-weight:500;margin-bottom:2px}
.tt-la{font-size:10px;color:rgba(247,245,240,.45);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em}
.tt-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;gap:1px;margin-bottom:6px}
.tt-row{display:flex;justify-content:space-between;gap:10px;font-size:11px;color:rgba(247,245,240,.6);margin-bottom:3px}
.tt-val{font-weight:500;color:rgba(247,245,240,.9)}
.tt-synth{font-size:9px;color:rgba(247,245,240,.35);margin-top:5px;padding-top:4px;border-top:1px solid rgba(247,245,240,.12)}

/* CARDS VIEW */
.card-view{flex:1;overflow-y:auto;min-height:0;padding:2px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:6px}
.wcard{background:white;border:1px solid rgba(26,26,46,.1);border-left:3px solid transparent;border-radius:5px;padding:8px 10px}
.wcard.PAD{border-left-color:#1a7fc4}
.wcard.Responder{border-left-color:#c0560d}
.wcard.Both{border-left-color:#5a9e30}
.wc-w{font-size:12px;font-weight:500;color:#1a1a2e;margin-bottom:1px;line-height:1.3}
.wc-la{font-size:9px;color:#7a7a9a;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.wc-bw{height:5px;border-radius:3px;background:#e8e8f0;margin-bottom:3px;overflow:hidden;position:relative}
.wc-bp{height:100%;border-radius:3px;position:absolute;left:0;top:0}
.wc-br{height:100%;border-radius:3px;position:absolute;right:0;top:0}
.wc-lbs{display:flex;justify-content:space-between;font-size:9px;margin-bottom:4px}
.badge{display:inline-flex;align-items:center;font-size:10px;font-weight:500;padding:1px 7px;border-radius:999px}
.badge.PAD{background:#d4eaf7;color:#0d4f6e}
.badge.Responder{background:#fde8d4;color:#6b2f0a}
.badge.Both{background:#ddf0c8;color:#2e5c1a}
.wc-ms{display:grid;grid-template-columns:1fr 1fr;gap:2px;font-size:9px;color:#7a7a9a;margin-top:3px}
.wc-ms span{font-weight:500;color:#3d3d5c}

/* TABLE VIEW */
.table-view{flex:1;overflow:auto;min-height:0}
.wtable{width:100%;border-collapse:collapse;font-size:11px;background:white;border:1px solid rgba(26,26,46,.1);border-radius:6px;overflow:hidden}
.wtable th{font-size:9px;font-weight:500;text-transform:uppercase;letter-spacing:.07em;color:#7a7a9a;padding:5px 10px;background:#edeae3;border-bottom:1px solid rgba(26,26,46,.1);text-align:left;cursor:pointer;white-space:nowrap;user-select:none}
.wtable th:hover{color:#1a1a2e}
.wtable td{padding:4px 10px;border-bottom:0.5px solid rgba(26,26,46,.06);color:#3d3d5c;vertical-align:middle;white-space:nowrap}
.wtable tr:last-child td{border-bottom:none}
.wtable tr:hover td{background:rgba(26,26,46,.02)}
.ibar{height:7px;border-radius:3px;display:inline-block;vertical-align:middle}
.sstr{font-size:9px;color:#7a7a9a;margin-left:3px}
</style>
</head>

<div class="app">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <span class="tb-title">PAD vs Cardiac Responder — 336 wards · 32 councils</span>
    <div class="sep"></div>
    <span class="tb-label">Filter</span>
    <div class="pills">
      <button class="pill on" id="fp-all"  onclick="setRec('all')">All</button>
      <button class="pill"    id="fp-PAD"  onclick="setRec('PAD')">PAD</button>
      <button class="pill"    id="fp-Responder" onclick="setRec('Responder')">Responder</button>
      <button class="pill"    id="fp-Both" onclick="setRec('Both')">Both</button>
    </div>
    <div class="sep"></div>
    <select id="laFilter" onchange="applyF()">
      <option value="">All councils</option>
    </select>
    <div class="sep"></div>
    <span class="tb-label">Strength</span>
    <div class="pills">
      <button class="pill on" id="sp-all"      onclick="setStr('all')">All</button>
      <button class="pill"    id="sp-Strong"   onclick="setStr('Strong')">Strong</button>
      <button class="pill"    id="sp-Moderate" onclick="setStr('Moderate')">Moderate</button>
    </div>
    <span class="data-note">⚠ density = estimated</span>
  </div>

  <!-- COUNTS -->
  <div class="counts">
    <div class="ct"><span class="ct-n" style="color:#1a7fc4" id="c-pad">130</span><span class="ct-d">PAD</span></div>
    <div class="ct"><span class="ct-n" style="color:#c0560d" id="c-resp">134</span><span class="ct-d">Responder</span></div>
    <div class="ct"><span class="ct-n" style="color:#5a9e30" id="c-both">72</span><span class="ct-d">Both</span></div>
    <div class="ct"><span class="ct-n" style="color:#7a7a9a" id="c-show">336</span><span class="ct-d">shown</span></div>
  </div>

  <!-- VIEW TABS -->
  <div class="vtabs">
    <button class="vtab active" id="vt-scatter" onclick="setView('scatter')">Scatter chart</button>
    <button class="vtab"        id="vt-cards"   onclick="setView('cards')">Ward cards</button>
    <button class="vtab"        id="vt-table"   onclick="setView('table')">Table</button>
  </div>

  <!-- SCATTER -->
  <div class="chart-card" id="view-scatter">
    <canvas id="bgC"></canvas>
    <canvas id="bubC"></canvas>
    <div class="tt" id="tt"></div>
  </div>

  <!-- CARDS -->
  <div class="card-view" id="view-cards" style="display:none">
    <div class="card-grid" id="cardGrid"></div>
  </div>

  <!-- TABLE -->
  <div class="table-view" id="view-table" style="display:none">
    <table class="wtable">
      <thead><tr>
        <th onclick="sortT('ward')">Ward</th>
        <th onclick="sortT('la')">Council</th>
        <th onclick="sortT('pad_score')">PAD score</th>
        <th onclick="sortT('resp_score')">Resp. score</th>
        <th>Recommendation</th>
        <th onclick="sortT('rt')">RT (min)</th>
        <th onclick="sortT('n')">Arrests</th>
      </tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

const C={PAD:'#1a7fc4',Resp:'#c0560d',Both:'#5a9e30'};
let filtered=[...ALL],recF='all',strF='all',laF='',view='scatter',sortK='pad_score',sortD=-1;

// Populate council select
const laSelect=document.getElementById('laFilter');
[...new Set(ALL.map(d=>d.la))].sort().forEach(la=>{const o=document.createElement('option');o.value=la;o.textContent=la;laSelect.appendChild(o);});

function applyF(){
  laF=laSelect.value;
  filtered=ALL.filter(d=>{
    if(laF&&d.la!==laF)return false;
    if(recF!=='all'&&d.rec!==recF)return false;
    if(strF==='Strong'&&d.strength!=='Strong')return false;
    if(strF==='Moderate'&&d.strength!=='Moderate')return false;
    return true;
  });
  updateCounts();
  if(view==='scatter')renderScatter();
  else if(view==='cards')renderCards();
  else renderTable();
}

function updateCounts(){
  document.getElementById('c-pad').textContent=filtered.filter(d=>d.rec==='PAD').length;
  document.getElementById('c-resp').textContent=filtered.filter(d=>d.rec==='Responder').length;
  document.getElementById('c-both').textContent=filtered.filter(d=>d.rec==='Both').length;
  document.getElementById('c-show').textContent=filtered.length;
}

function setRec(r){recF=r;['all','PAD','Responder','Both'].forEach(x=>{const p=document.getElementById('fp-'+x);if(p)p.className='pill'+(x===r?' on-'+(x==='all'?'':x.toLowerCase().slice(0,4)):'');});applyF();}
function setStr(s){strF=s;['all','Strong','Moderate'].forEach(x=>{const p=document.getElementById('sp-'+x);if(p)p.className='pill'+(x===s?' on':'');});applyF();}

function setView(v){
  view=v;
  ['scatter','cards','table'].forEach(x=>{
    const el=document.getElementById('view-'+x);
    el.style.display=x===v?(x==='scatter'?'block':'block'):'none';
    document.getElementById('vt-'+x).classList.toggle('active',x===v);
  });
  if(v==='scatter')renderScatter();
  else if(v==='cards')renderCards();
  else renderTable();
}

/* ── SCATTER ── */
function dotR(n,W){return Math.max(5,Math.min(W/30,Math.sqrt(n/124)*18));}
function dotCol(d){return d.rec==='PAD'?C.PAD:d.rec==='Responder'?C.Resp:C.Both;}

function renderScatter(){
  const card=document.getElementById('view-scatter');
  const W=card.clientWidth,H=card.clientHeight;
  ['bgC','bubC'].forEach(id=>{const c=document.getElementById(id);c.width=W;c.height=H;c.style.width=W+'px';c.style.height=H+'px';});
  const P={l:48,r:16,t:14,b:40};const cW=W-P.l-P.r,cH=H-P.t-P.b;
  const xp=v=>P.l+(v-3)/25*cW;
  const yp=v=>P.t+cH-(v/105)*cH;

  const bg=document.getElementById('bgC').getContext('2d');
  bg.clearRect(0,0,W,H);
  const gc='rgba(26,26,46,0.06)',tc='rgba(26,26,46,0.35)',ac='rgba(26,26,46,0.16)';
  bg.font='10px "DM Sans",sans-serif';
  [5,8,10,12,15,18,21,25,27].forEach(v=>{
    const x=xp(v);bg.strokeStyle=gc;bg.lineWidth=0.5;bg.beginPath();bg.moveTo(x,P.t);bg.lineTo(x,P.t+cH);bg.stroke();
    bg.fillStyle=tc;bg.textAlign='center';bg.fillText(v,x,P.t+cH+15);
  });
  [0,25,50,75,100].forEach(v=>{
    const y=yp(v);if(y<P.t||y>P.t+cH)return;
    bg.strokeStyle=v===50?'rgba(26,26,46,0.15)':gc;bg.lineWidth=v===50?1:0.5;
    bg.beginPath();bg.moveTo(P.l,y);bg.lineTo(P.l+cW,y);bg.stroke();
    bg.fillStyle=tc;bg.textAlign='right';bg.fillText(v+'%',P.l-5,y+4);
  });
  bg.strokeStyle=ac;bg.lineWidth=1;
  bg.beginPath();bg.moveTo(P.l,P.t);bg.lineTo(P.l,P.t+cH);bg.stroke();
  bg.beginPath();bg.moveTo(P.l,P.t+cH);bg.lineTo(P.l+cW,P.t+cH);bg.stroke();
  // Labels
  bg.fillStyle='rgba(26,26,46,0.35)';bg.font='10px "DM Sans",sans-serif';bg.textAlign='center';
  bg.fillText('Ambulance response time (minutes)',P.l+cW/2,H-5);
  bg.save();bg.translate(12,P.t+cH/2);bg.rotate(-Math.PI/2);bg.fillText('PAD score (higher = favour PAD)',0,0);bg.restore();
  // 50% label
  const y50=yp(50);
  bg.fillStyle='rgba(26,26,46,0.25)';bg.font='9px "DM Sans",sans-serif';bg.textAlign='right';
  bg.fillText('← PAD  |  Responder →',P.l+cW-4,y50-3);

  // Bubbles
  const bub=document.getElementById('bubC').getContext('2d');
  bub.clearRect(0,0,W,H);
  [...filtered].sort((a,b)=>b.n-a.n).forEach(d=>{
    const x=xp(d.rt),y=yp(d.pad_score),r=dotR(d.n,W);
    bub.beginPath();bub.arc(x,y,r,0,Math.PI*2);
    bub.fillStyle=dotCol(d)+'cc';bub.fill();
    bub.strokeStyle=dotCol(d);bub.lineWidth=0.8;bub.stroke();
  });

  // Store for hover
  document.getElementById('bubC')._data=filtered;
  document.getElementById('bubC')._xp=xp;
  document.getElementById('bubC')._yp=yp;
  document.getElementById('bubC')._W=W;
}

document.getElementById('bubC').addEventListener('mousemove',function(e){
  if(!this._data)return;
  const rect=this.getBoundingClientRect();
  const mx=e.clientX-rect.left,my=e.clientY-rect.top;
  const tt=document.getElementById('tt');let hit=null;
  for(const d of this._data){
    const x=this._xp(d.rt),y=this._yp(d.pad_score),r=dotR(d.n,this._W);
    if(Math.hypot(mx-x,my-y)<=r+4){hit=d;break;}
  }
  if(hit){
    tt.innerHTML=`<div class="tt-name">${hit.ward}</div><div class="tt-la">${hit.la}</div>
      <div class="tt-bar"><div style="width:${hit.pad_score}%;background:#1a7fc4;border-radius:3px 0 0 3px"></div><div style="width:${hit.resp_score}%;background:#c0560d;border-radius:0 3px 3px 0"></div></div>
      <div class="tt-row"><span>PAD score</span><span class="tt-val" style="color:#7ab8d4">${hit.pad_score}%</span></div>
      <div class="tt-row"><span>Resp. score</span><span class="tt-val" style="color:#f4a06a">${hit.resp_score}%</span></div>
      <div class="tt-row"><span>Response time</span><span class="tt-val">${hit.rt} min</span></div>
      <div class="tt-row"><span>Arrests</span><span class="tt-val">${hit.n}</span></div>
      <div class="tt-synth">* density ${hit.density.toLocaleString()}/km² — estimated</div>`;
    tt.style.left=(e.clientX+14)+'px';tt.style.top=Math.max(60,e.clientY-40)+'px';tt.style.display='block';this.style.cursor='crosshair';
  }else{tt.style.display='none';this.style.cursor='default';}
});
document.getElementById('bubC').addEventListener('mouseleave',()=>document.getElementById('tt').style.display='none');

/* ── CARDS ── */
function renderCards(){
  document.getElementById('cardGrid').innerHTML=filtered.map(d=>`
    <div class="wcard ${d.rec}">
      <div class="wc-w">${d.ward}</div>
      <div class="wc-la">${d.la}</div>
      <div class="wc-bw">
        <div class="wc-bp" style="width:${d.pad_score}%;background:#1a7fc4;opacity:.8"></div>
        <div class="wc-br" style="width:${d.resp_score}%;background:#c0560d;opacity:.8"></div>
      </div>
      <div class="wc-lbs">
        <span style="color:#1a7fc4;font-size:9px;font-weight:500">PAD ${d.pad_score}%</span>
        <span class="badge ${d.rec}">${d.rec}</span>
        <span style="color:#c0560d;font-size:9px;font-weight:500">Resp ${d.resp_score}%</span>
      </div>
      <div class="wc-ms">
        <div>RT: <span>${d.rt}min</span></div>
        <div>Arrests: <span>${d.n}</span></div>
      </div>
    </div>`).join('');
}

/* ── TABLE ── */
function sortT(k){
  if(sortK===k)sortD*=-1;else{sortK=k;sortD=-1;}
  filtered.sort((a,b)=>typeof a[k]==='string'?a[k].localeCompare(b[k])*sortD:(a[k]-b[k])*sortD);
  renderTable();
}
function renderTable(){
  document.getElementById('tbody').innerHTML=filtered.map(d=>`<tr>
    <td><strong style="color:#1a1a2e;font-weight:500">${d.ward}</strong></td>
    <td>${d.la}</td>
    <td><div style="display:flex;align-items:center;gap:5px"><div class="ibar" style="width:${d.pad_score*0.6}px;background:#1a7fc4;opacity:.8"></div><span style="font-size:10px;font-family:'DM Mono',monospace">${d.pad_score}%</span></div></td>
    <td><div style="display:flex;align-items:center;gap:5px"><div class="ibar" style="width:${d.resp_score*0.6}px;background:#c0560d;opacity:.8"></div><span style="font-size:10px;font-family:'DM Mono',monospace">${d.resp_score}%</span></div></td>
    <td><span class="badge ${d.rec}">${d.rec}</span><span class="sstr">${d.strength}</span></td>
    <td style="font-family:'DM Mono',monospace;font-size:10px">${d.rt}</td>
    <td style="font-family:'DM Mono',monospace;font-size:10px">${d.n}</td>
  </tr>`).join('');
}

// Init
window.addEventListener('load',()=>{
  // Fix view display
  document.getElementById('view-cards').style.display='none';
  document.getElementById('view-table').style.display='none';
  updateCounts();renderScatter();
});
window.addEventListener('resize',()=>{if(view==='scatter')renderScatter();});
</script>
